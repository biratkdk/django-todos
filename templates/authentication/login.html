{% extends "_partials/base.html" %}
{% load static %}

{% block title %}
Login | Django Todos
{% endblock %}

{% block content %}
<div class="ui middle aligned center aligned grid auth-page">
  <div class="sixteen wide mobile ten wide tablet six wide computer column">
    <div class="auth-card">
      <h2 class="ui teal image header">
        <img src={% static 'img/Logo.png' %} class="image" alt="Django Todos logo" />
        <div class="content">Log in</div>
      </h2>

      {% include '_partials/messages.html'%}

      <form class="ui large form" method="post" action={% url 'login' %}>
        {% csrf_token %}
        <div class="ui stacked segment">
          <div class="field{% if form.username.errors %} error{% endif %}">
            <div class="ui left icon input">
              <i class="user icon"></i>
              {{ form.username }}
            </div>
          </div>
          <div class="field{% if form.password.errors or form.non_field_errors %} error{% endif %}">
            <div class="ui left icon input">
              <i class="lock icon"></i>
              {{ form.password }}
            </div>
          </div>
          <button class="ui fluid large teal submit button">Login</button>
        </div>
      </form>

      <div class="ui message">Don't have an account? <a href={% url 'register'  %}>Sign up</a></div>
    </div>
  </div>
</div>
{% endblock content %}
